<!DOCTYPE html>
<html>
<head>
  <title>∫AI - Integrate AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0a1f44, #020617);
      color: white;
      text-align: center;
    }

    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeOut 2s ease forwards;
      animation-delay: 2s;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    .logo-box {
      background: #0a1f44;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 40px #1e3a8a;
      font-size: 50px;
    }

    .container {
      margin-top: 120px;
    }

    input, select {
      width: 60%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #2563eb, #1e3a8a);
      color: white;
      cursor: pointer;
    }

    #output {
      margin-top: 30px;
      padding: 20px;
      width: 70%;
      margin-left: auto;
      margin-right: auto;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>

<div id="splash">
  <div class="logo-box">∫AI</div>
</div>

<div class="container">
  <h1>∫AI</h1>

  <select id="mode">
    <option value="smart">Smart Answer</option>
    <option value="compare">Compare</option>
    <option value="verify">Verify</option>
  </select>

  <br>

  <input id="question" placeholder="Ask anything..." />
  <br>

  <button onclick="askAI()">Ask</button>

  <div id="output"></div>
</div>

<footer>
© 2026 Integrate AI — Powered by ∫AI Engine
</footer>

<script>
function extractText(data) {
  if (Array.isArray(data) && data[0]?.generated_text) {
    return data[0].generated_text;
  }
  if (Array.isArray(data) && data[0]?.summary_text) {
    return data[0].summary_text;
  }
  return JSON.stringify(data);
}

function mergeAnswers(a, b) {
  if (!a) return b;
  if (!b) return a;

  return a.length > b.length
    ? a + "\\n\\n[Enhanced]\\n" + b
    : b + "\\n\\n[Enhanced]\\n" + a;
}

async function askAI() {
  let q = document.getElementById("question").value;
  let mode = document.getElementById("mode").value;
  let output = document.getElementById("output");

  if (!q) return;

  output.innerHTML = "<div class='loader'></div>";

  try {
    let [res1, res2] = await Promise.all([
      fetch("https://api-inference.huggingface.co/models/google/flan-t5-base", {
        method: "POST",
        body: JSON.stringify({ inputs: q })
      }),
      fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
        method: "POST",
        body: JSON.stringify({ inputs: q })
      })
    ]);

    let data1 = await res1.json();
    let data2 = await res2.json();

    let text1 = extractText(data1);
    let text2 = extractText(data2);
    let finalAnswer = mergeAnswers(text1, text2);

    if (mode === "compare") {
      output.innerHTML = `
        <h3>⚖️ Comparison</h3>
        <p><b>Model A:</b> ${text1}</p>
        <p><b>Model B:</b> ${text2}</p>
      `;
    }

    else if (mode === "verify") {
      let verdict = (text1 === text2) ? "✅ Both agree" : "⚠️ Possible conflict";

      output.innerHTML = `
        <h3>🔍 Verification</h3>
        <p>${verdict}</p>
        <p>${finalAnswer}</p>
      `;
    }

    else {
      output.innerHTML = `
        <h3>🧠 Smart Answer</h3>
        <p>${finalAnswer}</p>
      `;
    }

  } catch (err) {
    output.innerHTML = "Error fetching AI response.";
  }
}
</script>

</body>
</html>
